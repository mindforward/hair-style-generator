<!DOCTYPE html>
<html lang="en">
<meta name="author" content="Fred Chung">.
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 風格大變身 - AI Style Transformation @YC Openday</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Arial', Helvetica, sans-serif;
            background-color: #FDB924;  /* primary theme color */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .app-wrapper {
            max-width: 1600px;
            width: 100%;
            background-color: white;
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.3);
            padding: 28px 25px 35px;
            border: 2px solid #00ADEF;
        }

        /* header with language toggle and logo */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .logo-svg {
            height: 100px;
            width: auto;
            display: flex;
            align-items: center;
        }
        .logo-svg svg {
            height: 100px;
            width: auto;
            max-width: 180px;
        }
        .logo-area h1 {
            color: #717073;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            white-space: nowrap;
        }
        .lang-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .camera-toggle-btn {
            background: #FDB924;
            border: none;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 3px 0 #0079a8;
            transition: 0.1s ease;
            border: 1px solid #ffffff90;
            margin-right: 5px;
        }
        .camera-toggle-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .lang-btn {
            background: #BAC405;
            border: none;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 3px 0 #8f9c04;
            transition: 0.1s ease;
            border: 1px solid #ffffff90;
        }
        .lang-btn.active {
            background: #00ADEF;
            box-shadow: 0 3px 0 #0079a8;
            transform: scale(0.97);
        }
        .lang-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* pools row with horizontal scroll (slider) */
        .pools-row {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding: 8px 5px 20px 5px;
            scrollbar-width: thin;
            scrollbar-color: #00ADEF #FDB92430;
            -webkit-overflow-scrolling: touch;
        }
        .pools-row::-webkit-scrollbar {
            height: 10px;
        }
        .pools-row::-webkit-scrollbar-track {
            background: #f0e5d8;
            border-radius: 20px;
        }
        .pools-row::-webkit-scrollbar-thumb {
            background: #00ADEF;
            border-radius: 20px;
        }
        .pool-card {
            min-width: 550px;          /* fixed width as requested */
            max-width: 550px;
            background: #fef8f0;
            border-radius: 40px;
            padding: 20px 18px 18px;
            box-shadow: 0 8px 0 #00ADEF, 0 12px 25px -10px #00000030;
            border: 2px solid #BAC405;
        }
        .pool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 8px;
        }
        .pool-title {
            color: #717073;
            font-weight: 800;
            font-size: 1.3rem;
            background: #FDB92440;
            padding: 5px 18px;
            border-radius: 40px;
            border: 1px solid #00ADEF;
        }
        .pool-count {
            background: #00ADEF;
            color: white;
            border-radius: 30px;
            padding: 3px 18px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .word-canvas.source {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px 15px;
            min-height: 140px;
            border: 3px dashed #BAC405;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            align-items: center;
            background: #fffcf2;
        }

        /* draggable word tags */
        .word-tag {
            background: white;
            border-radius: 60px;
            padding: 8px 22px;
            font-size: 1rem;
            font-weight: 600;
            color: #717073;
            box-shadow: 0 4px 0 #FDB924, 0 2px 10px rgba(0,0,0,0.05);
            border: 1.5px solid #00ADEF;
            cursor: grab;
            transition: 0.1s;
            user-select: none;
            white-space: nowrap;
            font-family: Arial, sans-serif;
        }
        .word-tag:active {
            cursor: grabbing;
            transform: scale(0.96);
            box-shadow: 0 1px 0 #FDB924;
        }

        /* destination (selected) area */
        .selected-section {
            margin: 30px 0 20px;
            background: #FDB92420;
            border-radius: 50px;
            padding: 20px 30px;
            border: 3px solid #00ADEF;
        }
        .selected-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #717073;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .selected-header span:last-child {
            background: #00ADEF;
            color: white;
            padding: 4px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
        }
        .destination {
            background: #fff6e7;
            border-radius: 40px;
            padding: 22px 20px;
            min-height: 130px;
            border: 2px dashed #BAC405;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 15px;
            align-items: center;
        }
        .destination .word-tag {
            cursor: pointer;
            background: #ffffff;
            border: 2px solid #00ADEF;
            box-shadow: 0 3px 0 #BAC405;
            padding-right: 38px;
            position: relative;
        }
        .destination .word-tag::after {
            content: "✕";
            font-size: 1.2rem;
            font-weight: bold;
            color: #FDB924;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            text-shadow: 0 1px 2px #00000020;
        }
        .destination .word-tag:hover {
            background: #ffe6d5;
        }

        /* prompt + copy area */
        .prompt-box {
            background: #ffffff;
            border-radius: 35px;
            padding: 20px 30px;
            border: 4px solid #00ADEF;
            box-shadow: inset 0 2px 8px #FDB92460;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #717073;
            margin: 10px 0 20px;
            font-family: Arial, sans-serif;
        }
        .prompt-box em {
            background: #BAC40540;
            font-style: italic;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 30px;
            border: 1px solid #00ADEF;
            color: #2c2c2c;
        }
        .copy-reset-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }
        .copilot-btn {
            background: #FDB924;
            border: none;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0072a0;
            transition: 0.1s;
            border: 1px solid #ffffff90;
        }
        .copilot-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }        
        .copy-btn {
            background: #00ADEF;
            border: none;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0072a0;
            transition: 0.1s;
            border: 1px solid #ffffff90;
        }
        .copy-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .reset-btn {
            background: #BAC405;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #8a9404;
            transition: 0.1s;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .limit-warning {
            color: #c24a2b;
            font-weight: bold;
            margin-left: 15px;
            font-size: 0.95rem;
        }
        .footer-note {
            color: #717073;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* Camera modal styles */
        .camera-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: white;
            border-radius: 40px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 4px solid #00ADEF;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #717073;
            cursor: pointer;
            line-height: 1;
            transition: 0.1s;
        }
        .modal-close:hover {
            color: #00ADEF;
        }
        .modal-title {
            color: #717073;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-right: 30px;
        }
        .webcam-container {
            background: #cbdde9;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #BAC405;
        }
        #modalVideo {
            display: block;
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 20px;
            background-color: #2d3e4e;
            margin: 0 auto;
            aspect-ratio: 4/3;
            object-fit: cover;
        }
        .modal-capture-btn {
            background: #00ADEF;
            border: none;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 15px 30px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0072a0;
            transition: 0.1s;
            border: 1px solid white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0 5px;
        }
        .modal-capture-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .modal-footer {
            display: flex;
            justify-content: center;
        }
        #modalCanvas {
            display: none;
        }
        .yccampus {
            font-size: .6em;
            color: #0072a0;
        }
    </style>
</head>

        <div class="pool-card" data-pool="culture">
            <div class="pool-header">
                <span class="pool-title" id="titleCulture">🌍 CULTURE</span>
                <span class="pool-count">9</span>
            </div>
            <div id="sourceCulture" class="word-canvas source"></div>
        </div>
        <!-- pool 2 : aesthetic -->
        <div class="pool-card" data-pool="aesthetic">
            <div class="pool-header">
                <span class="pool-title" id="titleAesthetic">🎨 AESTHETIC</span>
                <span class="pool-count">9</span>
            </div>
            <div id="sourceAesthetic" class="word-canvas source"></div>
        </div>
        <!-- pool 3 : historical/decade -->
        <div class="pool-card" data-pool="decade">
            <div class="pool-header">
                <span class="pool-title" id="titleDecade">📅 DECADE / HISTORIC</span>
                <span class="pool-count">9</span>
            </div>
            <div id="sourceDecade" class="word-canvas source"></div>
        </div>
        <!-- pool 4 : texture & structure -->
        <div class="pool-card" data-pool="texture">
            <div class="pool-header">
                <span class="pool-title" id="titleTexture">🧵 TEXTURE & STRUCTURE</span>
                <span class="pool-count">9</span>
            </div>
            <div id="sourceTexture" class="word-canvas source"></div>
        </div>
    </div>

    <!-- selected tags area (max 5) -->
    <div class="selected-section">
        <div class="selected-header">
            <span id="selectedTitle">✨ SELECTED STYLES</span>
            <span><span id="selectedCount">0</span>/5</span>
        </div>
        <div id="destinationCanvas" class="destination"></div>
        <div id="maxWarning" class="limit-warning"></div>
    </div>

    <!-- prompt display -->
    <div id="promptDisplay" class="prompt-box">
        <!-- dynamic -->
    </div>

    <!-- copy & reset -->
    <div class="copy-reset-row">
        <button id="genAIBtn" class="copilot-btn">VTC GenAI</button>
        <button id="copilotBtn" class="copilot-btn">Copilot</button>
        <button id="copyBtn" class="copy-btn">📋 COPY PROMPT</button>
        <button id="resetBtn" class="reset-btn">🗑️ CLEAR ALL</button>
    </div>
    <div class="footer-note" id="footerNote">Youth College Openday - Designed and Developed by Fred Chung</div>
</div>

<!-- Camera Modal -->
<div id="cameraModal" class="camera-modal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <h2 class="modal-title" id="modalTitle">📸 Smile and Capture</h2>
        <div class="webcam-container">
            <video id="modalVideo" autoplay playsinline></video>
            <canvas id="modalCanvas" style="display: none;"></canvas>
        </div>
        <div class="modal-footer">
            <button id="modalCaptureBtn" class="modal-capture-btn">⬇️ DOWNLOAD PHOTO</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- word pools (ENGLISH default) ----------
        const CULTURE_EN = ["Chinese", "Japanese", "Korean", "American", "Brazilian", "French", "Indian", "Italian", "Moroccan"];
        const AESTHETIC_EN = ["Grunge", "Preppy", "Bohemian", "Punk", "Minimalist", "Glamour", "K-Pop", "Western", "Gothic"];
        const DECADE_EN = ["1920s vintage", "1970s disco", "1990s grunge", "Victorian", "Rockabilly", "Mod", "Renaissance", "Art Deco", "Hippie"];
        const TEXTURE_EN = ["straight", "wavy", "curly", "sleek", "voluminous", "textured", "braided", "ponytail", "loose"];

        // Traditional Chinese translations
        const CULTURE_CHT = ["中國", "日本", "韓國", "美國", "巴西", "法國", "印度", "義大利", "摩洛哥"];
        const AESTHETIC_CHT = ["頹廢風", "學院風", "波西米亞", "龐克", "極簡主義", "華麗風", "K-Pop", "西部風", "歌德"];
        const DECADE_CHT = ["1920年代復古", "1970年代迪斯可", "1990年代油漬", "維多利亞", "搖滾比利", "摩德風", "文藝復興", "裝飾藝術", "嬉皮"];
        const TEXTURE_CHT = ["直髮", "波浪", "捲髮", "滑順", "豐厚", "紋理感", "編髮", "馬尾", "鬆散"];

        // UI text bilingual
        const uiText = {
            eng: {
                mainTitle: "AI Style Transformation <span class='yccampus'>@YC Openday</span>",
                titleCulture: "🌍 CULTURE",
                titleAesthetic: "🎨 AESTHETIC",
                titleDecade: "📅 DECADE / HISTORIC",
                titleTexture: "🧵 TEXTURE & STRUCTURE",
                selectedTitle: "✨ SELECTED STYLES",
                footerNote: "Youth College Openday - Designed and Developed by Fred Chung",
                copyBtn: "📋 COPY PROMPT",
                resetBtn: "🗑️ CLEAR ALL",
                maxWarning: "Maximum 5 tags allowed (click ✕ to remove)",
                promptDefault: "Generate nine distinct portrait headshots of the person from the source image, maintaining consistent facial features and attire. Each headshot should feature a different hairstyle, including variations inspired by Japanese, Korean, and American styles. Present the results as a single 3x3 grid collage of close-up images. Show the style name at the bottom-right corner of each image.",
                cameraBtn: "📸 Open Camera",
                modalTitle: "📸 Smile and Capture",
                captureBtn: "⬇️ DOWNLOAD PHOTO"
            },
            cht: {
                mainTitle: "AI 風格大變身 <span class='yccampus'>@青年學院開放日</span>",
                titleCulture: "🌍 文化來源",
                titleAesthetic: "🎨 美學風格",
                titleDecade: "📅 年代／歷史風",
                titleTexture: "🧵 髮質與結構",
                selectedTitle: "✨ 已選風格",
                footerNote: "青年學院開放日 - Designed and Developed by Fred Chung",
                copyBtn: "📋 複製提示詞",
                resetBtn: "🗑️ 全部清除",
                maxWarning: "最多選擇5個標籤（點擊✕移除）",
                promptDefault: "生成九張不同的人物肖像頭像，使用來源影像保持面部特徵和服裝一致。每張頭像應展現不同的髮型，包括受日本、韓國和美國風格啟發的變化。以3x3網格拼貼方式呈現，並在每張圖片的右下角顯示風格名稱。",
                cameraBtn: "📸 打開相機",
                modalTitle: "📸 笑一笑！拍攝你的臉孔",
                captureBtn: "⬇️ 下載照片"
            }
        };

        // current language: 'eng' or 'cht'
        let currentLang = 'eng';

        // DOM elements
        const sourceCulture = document.getElementById('sourceCulture');
        const sourceAesthetic = document.getElementById('sourceAesthetic');
        const sourceDecade = document.getElementById('sourceDecade');
        const sourceTexture = document.getElementById('sourceTexture');
        const destDiv = document.getElementById('destinationCanvas');
        const promptDisplay = document.getElementById('promptDisplay');
        const selectedCountSpan = document.getElementById('selectedCount');
        const maxWarningDiv = document.getElementById('maxWarning');
        const copyBtn = document.getElementById('copyBtn');
        const resetBtn = document.getElementById('resetBtn');
        const btnENG = document.getElementById('btnENG');
        const btnCHT = document.getElementById('btnCHT');
        const cameraBtn = document.getElementById('cameraBtn');

        // Camera modal elements
        const modal = document.getElementById('cameraModal');
        const modalClose = document.getElementById('modalClose');
        const modalTitle = document.getElementById('modalTitle');
        const modalCaptureBtn = document.getElementById('modalCaptureBtn');
        const modalVideo = document.getElementById('modalVideo');
        const modalCanvas = document.getElementById('modalCanvas');
        let modalStream = null;

        // max tags limit
        const MAX_TAGS = 5;

        // helper: get current word arrays based on language
        function getCurrentWords() {
            if (currentLang === 'eng') {
                return {
                    culture: CULTURE_EN,
                    aesthetic: AESTHETIC_EN,
                    decade: DECADE_EN,
                    texture: TEXTURE_EN
                };
            } else {
                return {
                    culture: CULTURE_CHT,
                    aesthetic: AESTHETIC_CHT,
                    decade: DECADE_CHT,
                    texture: TEXTURE_CHT
                };
            }
        }

        // ----- create draggable source tag (from any pool) -----
        function createSourceTag(text) {
            const span = document.createElement('span');
            span.className = 'word-tag';
            span.textContent = text;
            span.setAttribute('draggable', 'true');
            span.setAttribute('data-value', text);
            span.addEventListener('dragstart', handleDragStart);
            span.addEventListener('dragend', handleDragEnd);
            return span;
        }

        // create destination tag (non-draggable, click to remove)
        function createDestTag(text) {
            const span = document.createElement('span');
            span.className = 'word-tag';
            span.textContent = text;
            span.setAttribute('data-value', text);
            span.setAttribute('draggable', 'false');
            span.addEventListener('click', function(e) {
                e.stopPropagation();
                if (span.parentNode === destDiv) {
                    span.remove();
                    updateSelectedCount();
                    updatePromptByLang();
                }
            });
            return span;
        }

        // drag handlers
        let draggedElement = null;
        function handleDragStart(e) {
            draggedElement = this;
            e.dataTransfer.setData('text/plain', this.textContent);
            this.style.opacity = '0.5';
        }
        function handleDragEnd(e) {
            this.style.opacity = '1';
            draggedElement = null;
            destDiv.classList.remove('drag-over');
        }

        // update selected count and warning
        function updateSelectedCount() {
            const count = destDiv.children.length;
            selectedCountSpan.textContent = count;
            if (count >= MAX_TAGS) {
                maxWarningDiv.textContent = currentLang === 'eng' ? uiText.eng.maxWarning : uiText.cht.maxWarning;
            } else {
                maxWarningDiv.textContent = '';
            }
        }

        // format word list with commas and "and"
        function formatWordList(words) {
            if (words.length === 0) return '';
            if (words.length === 1) return words[0];
            if (words.length === 2) return `${words[0]} and ${words[1]}`;
            const allButLast = words.slice(0, -1).join(', ');
            return `${allButLast} and ${words[words.length-1]}`;
        }

        // format for Chinese: use "、" and "與"
        function formatWordListCHT(words) {
            if (words.length === 0) return '';
            if (words.length === 1) return words[0];
            if (words.length === 2) return `${words[0]}與${words[1]}`;
            const allButLast = words.slice(0, -1).join('、');
            return `${allButLast}與${words[words.length-1]}`;
        }

        // update prompt based on selected tags and current language
        function updatePromptByLang() {
            const selected = Array.from(destDiv.children).map(tag => tag.textContent.trim());
            let finalString = '';
            let fullPrompt = '';

            const basePromptEN = "Generate nine distinct portrait headshots of the person from the source image, maintaining consistent facial features and attire. Each headshot should feature a different hairstyle, including variations inspired by {LIST} styles. Present the results as a single 3x3 grid collage of close-up images. Show the style name in English at the bottom-right corner of each image.";
            const basePromptCHT = "生成九張不同的人物肖像頭像，使用來源影像保持面部特徵和服裝一致。每張頭像應展現不同的髮型，包括受{LIST}啟發的變化。以3x3網格拼貼方式呈現，並在每張圖片的右下角以英文顯示風格名稱。";

            if (selected.length === 0) {
                // default placeholder
                if (currentLang === 'eng') {
                    finalString = 'Japanese, Korean and American';
                    fullPrompt = basePromptEN.replace('{LIST}', finalString);
                } else {
                    finalString = '日本、韓國與美國';
                    fullPrompt = basePromptCHT.replace('{LIST}', finalString);
                }
            } else {
                if (currentLang === 'eng') {
                    finalString = formatWordList(selected);
                    fullPrompt = basePromptEN.replace('{LIST}', finalString);
                } else {
                    finalString = formatWordListCHT(selected);
                    fullPrompt = basePromptCHT.replace('{LIST}', finalString);
                }
            }

            // highlight selected part with <em>
            let highlighted = '';
            if (currentLang === 'eng') {
                let displayList = selected.length === 0 ? 'Japanese, Korean and American' : formatWordList(selected);
                let prefix = "Generate nine distinct portrait headshots of the person from the source image, maintaining consistent facial features and attire. Each headshot should feature a different hairstyle, including variations inspired by ";
                let suffix = " styles. Present the results as a single 3x3 grid collage of close-up images. Show the style name in English at the bottom-right corner of each image.";
                if (selected.length === 0) {
                    highlighted = prefix + '<em>Japanese, Korean and American</em>' + suffix;
                } else {
                    let displaySelected = '';
                    if (selected.length === 1) displaySelected = `<em>${selected[0]}</em>`;
                    else if (selected.length === 2) displaySelected = `<em>${selected[0]}</em> and <em>${selected[1]}</em>`;
                    else {
                        const last = selected[selected.length-1];
                        const rest = selected.slice(0, -1).map(w => `<em>${w}</em>`).join(', ');
                        displaySelected = rest + ' and <em>' + last + '</em>';
                    }
                    highlighted = prefix + displaySelected + suffix;
                }
            } else {
                let prefix = "生成九張不同的人物肖像頭像，使用來源影像保持面部特徵和服裝一致。每張頭像應展現不同的髮型，包括受";
                let suffix = "啟發的變化。以3x3網格拼貼方式呈現，並在每張圖片的右下角以英文顯示風格名稱。";
                if (selected.length === 0) {
                    highlighted = prefix + '<em>日本、韓國與美國</em>' + suffix;
                } else {
                    let displaySelected = '';
                    if (selected.length === 1) displaySelected = `<em>${selected[0]}</em>`;
                    else if (selected.length === 2) displaySelected = `<em>${selected[0]}</em>與<em>${selected[1]}</em>`;
                    else {
                        const last = selected[selected.length-1];
                        const rest = selected.slice(0, -1).map(w => `<em>${w}</em>`).join('、');
                        displaySelected = rest + '與<em>' + last + '</em>';
                    }
                    highlighted = prefix + displaySelected + suffix;
                }
            }
            promptDisplay.innerHTML = highlighted;
        }

        // refresh all source pools based on current language
        function refreshSourcePools() {
            const words = getCurrentWords();
            sourceCulture.innerHTML = '';
            sourceAesthetic.innerHTML = '';
            sourceDecade.innerHTML = '';
            sourceTexture.innerHTML = '';

            words.culture.forEach(w => sourceCulture.appendChild(createSourceTag(w)));
            words.aesthetic.forEach(w => sourceAesthetic.appendChild(createSourceTag(w)));
            words.decade.forEach(w => sourceDecade.appendChild(createSourceTag(w)));
            words.texture.forEach(w => sourceTexture.appendChild(createSourceTag(w)));
        }

        // update all UI texts (titles, footer, buttons, prompt, camera button)
        function updateUILanguage() {
            const txt = currentLang === 'eng' ? uiText.eng : uiText.cht;
            document.getElementById('main-title').innerHTML = txt.mainTitle;
            document.getElementById('titleCulture').textContent = txt.titleCulture;
            document.getElementById('titleAesthetic').textContent = txt.titleAesthetic;
            document.getElementById('titleDecade').textContent = txt.titleDecade;
            document.getElementById('titleTexture').textContent = txt.titleTexture;
            document.getElementById('selectedTitle').textContent = txt.selectedTitle;
            document.getElementById('footerNote').textContent = txt.footerNote;
            copyBtn.textContent = txt.copyBtn;
            resetBtn.textContent = txt.resetBtn;
            cameraBtn.textContent = txt.cameraBtn;
            modalTitle.textContent = txt.modalTitle;
            modalCaptureBtn.textContent = txt.captureBtn;

            // update prompt
            updatePromptByLang();
            updateSelectedCount(); // warning message update
        }

        // switch language
        function setLanguage(lang) {
            currentLang = lang;
            btnENG.classList.toggle('active', lang === 'eng');
            btnCHT.classList.toggle('active', lang === 'cht');
            refreshSourcePools();
            updateUILanguage();
        }

        // ----- destination drop target -----
        destDiv.addEventListener('dragover', (e) => {
            e.preventDefault();
            destDiv.classList.add('drag-over');
        });
        destDiv.addEventListener('dragleave', () => {
            destDiv.classList.remove('drag-over');
        });
        destDiv.addEventListener('drop', (e) => {
            e.preventDefault();
            destDiv.classList.remove('drag-over');
            const word = e.dataTransfer.getData('text/plain');
            if (!word) return;

            // max 5 limit
            if (destDiv.children.length >= MAX_TAGS) {
                alert(currentLang === 'eng' ? 'Maximum 5 tags allowed.' : '最多只能選擇5個標籤');
                return;
            }

            // avoid duplicate
            const existing = Array.from(destDiv.children).some(tag => tag.textContent === word);
            if (!existing) {
                const chip = createDestTag(word);
                destDiv.appendChild(chip);
                updateSelectedCount();
                updatePromptByLang();
            } else {
                alert(currentLang === 'eng' ? 'Tag already selected.' : '該標籤已選');
            }
        });

        // prevent default on source divs
        [sourceCulture, sourceAesthetic, sourceDecade, sourceTexture].forEach(div => {
            div.addEventListener('dragover', e => e.preventDefault());
            div.addEventListener('drop', e => e.preventDefault());
        });

        // reset button
        resetBtn.addEventListener('click', () => {
            while (destDiv.firstChild) destDiv.removeChild(destDiv.firstChild);
            updateSelectedCount();
            updatePromptByLang();
        });

        copilotBtn.addEventListener('click', () => {
            window.open("https://m365.cloud.microsoft/chat/");
        });

        genAIBtn.addEventListener('click', () => {
            window.open("https://genai.vtc.edu.hk");
        });

        // copy button
        copyBtn.addEventListener('click', () => {
            const selected = Array.from(destDiv.children).map(tag => tag.textContent.trim());
            let finalString = '';
            let fullPlain = '';

            if (currentLang === 'eng') {
                const base = "Generate nine distinct portrait headshots of the person from the source image, maintaining consistent facial features and attire. Each headshot should feature a different hairstyle, including variations inspired by {LIST}. Present the results as a single 3x3 grid collage of close-up images. Show the style name at the bottom-right corner of each image.";
                if (selected.length === 0) finalString = 'Japanese, Korean and American';
                else finalString = formatWordList(selected);
                fullPlain = base.replace('{LIST}', finalString);
            } else {
                const base = "生成九張不同的人物肖像頭像，使用來源影像保持面部特徵和服裝一致。每張頭像應展現不同的髮型，包括受{LIST}啟發的變化。以3x3網格拼貼方式呈現，並在每張圖片的右下角顯示風格名稱。";
                if (selected.length === 0) finalString = '日本、韓國與美國';
                else finalString = formatWordListCHT(selected);
                fullPlain = base.replace('{LIST}', finalString);
            }

            navigator.clipboard.writeText(fullPlain).then(() => {
                copyBtn.textContent = currentLang === 'eng' ? '✅ COPIED!' : '✅ 已複製!';
                setTimeout(() => {
                    copyBtn.textContent = currentLang === 'eng' ? uiText.eng.copyBtn : uiText.cht.copyBtn;
                }, 1500);
            }).catch(() => alert('Clipboard error'));
        });

        // language buttons
        btnENG.addEventListener('click', () => setLanguage('eng'));
        btnCHT.addEventListener('click', () => setLanguage('cht'));

        // Camera modal logic
        async function openCameraModal() {
            modal.style.display = 'flex';
            try {
                modalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                modalVideo.srcObject = modalStream;
            } catch (err) {
                alert(currentLang === 'eng' ? 'Camera access denied or not available.' : '無法存取相機或相機不可用');
                modal.style.display = 'none';
            }
        }

        function closeCameraModal() {
            if (modalStream) {
                modalStream.getTracks().forEach(track => track.stop());
                modalStream = null;
            }
            modalVideo.srcObject = null;
            modal.style.display = 'none';
        }

        cameraBtn.addEventListener('click', openCameraModal);
        modalClose.addEventListener('click', closeCameraModal);
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeCameraModal();
        });

        // Capture and download
        modalCaptureBtn.addEventListener('click', () => {
            if (!modalStream) return;
            const vWidth = modalVideo.videoWidth;
            const vHeight = modalVideo.videoHeight;
            if (vWidth === 0 || vHeight === 0) {
                alert(currentLang === 'eng' ? 'Camera not ready' : '相機未就緒');
                return;
            }
            modalCanvas.width = vWidth;
            modalCanvas.height = vHeight;
            const ctx = modalCanvas.getContext('2d');
            ctx.drawImage(modalVideo, 0, 0, vWidth, vHeight);

            // timestamp YYYYMMDD_HHMMSS.png
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timestamp = `${year}${month}${day}_${hours}${minutes}${seconds}`;
            const fileName = `${timestamp}.png`;

            const pngDataUrl = modalCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = pngDataUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // initial render (english)
        refreshSourcePools();
        updateSelectedCount();
        updatePromptByLang();

        // extra: prevent body drop
        document.body.addEventListener('dragover', e => e.preventDefault());
        document.body.addEventListener('drop', e => e.preventDefault());


        // trigger a "Chinese" button to set defailt Chinese version
        const chineseBtn = document.getElementById("btnCHT");
        chineseBtn.click();
    })();
</script>
</body>
</html>
